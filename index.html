<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Disponibilidad PPOC Montequinto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg w-100" style="max-width: 700px;">
        <div class="card-header text-center py-4">
            <h2 class="mb-0">🗓️ Disponibilidad Anual PPOC</h2>
            <p class="mb-0 opacity-75">Selecciona tus turnos asignados</p>
        </div>
        
        <div class="card-body p-4">
            <form id="dispoForm">
                <div class="mb-4">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control form-control-lg" placeholder="Ej: Maria García" required>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle border">
                        <thead class="table-light text-center">
                            <tr>
                                <th class="text-start">Día</th>
                                <th>Mañana</th>
                                <th>Tarde</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpo">
                            <tr><td>Martes</td><td class="text-center"><input type="checkbox" name="Martes_M"></td><td class="text-center"><input type="checkbox" name="Martes_T"></td></tr>
                            <tr><td>Jueves</td><td class="text-center"><input type="checkbox" name="Jueves_M"></td><td class="text-center"><input type="checkbox" name="Jueves_T"></td></tr>
                            <tr><td>Viernes</td><td class="text-center"><input type="checkbox" name="Viernes_M"></td><td class="text-center"><input type="checkbox" name="Viernes_T"></td></tr>
                            <tr class="table-warning"><td>Sábado</td><td class="text-center"><input type="checkbox" name="Sabado_M"></td><td class="text-center text-muted small">---</td></tr>
                            <tr class="table-warning"><td>Domingo</td><td class="text-center"><input type="checkbox" name="Domingo_M"></td><td class="text-center text-muted small">---</td></tr>
                        </tbody>
                    </table>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 mt-3 fw-bold" id="btnSubmit">
                    ENVIAR DISPONIBILIDAD
                </button>
            </form>
            <div id="feedback" class="mt-3 text-center d-none"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
